function StatBar({ id, value }) {
  const cfg = STAT_CFG[id];
  const pct = Math.min(100, (value / cfg.max) * 100);
  const danger = id === "secret" && value >= 5;
  return (
    <div style={{ marginBottom: 9 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#9ca3af", marginBottom: 3 }}>
        <span>{cfg.icon} {cfg.label}</span>
        <span style={{ color: "#d1d5db" }}>{id === "secret" ? `${value}/10格` : value}</span>
      </div>
      <div style={{ background: "rgba(255,255,255,0.07)", borderRadius: 6, height: 7 }}>
        <div style={{
          width: `${pct}%`, height: "100%",
          background: danger ? "#ef4444" : cfg.color,
          borderRadius: 6, transition: "width 0.5s ease",
          boxShadow: `0 0 6px ${cfg.color}66`,
        }} />
      </div>
    </div>
  );
}

function App() {
  const [stats, setStats] = useState({ qv: 20, sm: 20, hm: 20, liang: 25, secret: 0 });
  const [scene, setScene] = useState(null);
  const [phase, setPhase] = useState("home"); // home | scene | result | ending
  const [result, setResult] = useState(null);
  const [chosenText, setChosenText] = useState("");
  const [chosenIcon, setChosenIcon] = useState("");
  const [chosenEffect, setChosenEffect] = useState({});
  const [history, setHistory] = useState([]);
  const [achv, setAchv] = useState(new Set());
  const [playedToday, setPlayedToday] = useState(new Set());
  const [maxAge, setMaxAge] = useState(2); // 当前已解锁年龄阶段（开局 young+all 均解锁）
  const [ending, setEnding] = useState(null);
  // 每天的场景上限：8-12 随机
  const [dailyLimit, setDailyLimit] = useState(() => 8 + Math.floor(Math.random() * 5));

  // ───── 成就映射（result 文本里包含 ✨ 解锁【XXX】就自动解锁）─────
  const ACHV_FROM_RESULT_RE = /✨\s*解锁【([^】]+)】/g;

  const applyEffect = (effect, choiceText, prevStats, choiceResult) => {
    const next = { ...prevStats };
    Object.entries(effect).forEach(([k, v]) => {
      next[k] = Math.max(0, Math.min(k === "secret" ? 10 : 50, (next[k] || 0) + v));
    });
    const newAchv = new Set(achv);
    // 数值阈值类成就
    if (next.sm >= 45) newAchv.add("爹地笑了");
    if (next.hm >= 45) newAchv.add("爸比哭了");
    if (next.liang >= 45) newAchv.add("完美配合");
    if (next.secret === 0 && prevStats.secret > 0) newAchv.add("秘密全清");
    if (next.sm > 30 && next.hm > 30) newAchv.add("两个爸爸");
    // result 文本里 ✨ 解锁【XXX】 自动注入
    if (choiceResult) {
      let m;
      const re = new RegExp(ACHV_FROM_RESULT_RE.source, 'g');
      while ((m = re.exec(choiceResult)) !== null) {
        newAchv.add(m[1]);
      }
    }
    setAchv(newAchv);
    setStats(next);
  };

  // 推进逻辑：玩到 1/3 解锁少年期；池子用「≤ 当前 maxAge」而非「= maxAge」，避免开头被 young 4 个场景困住
  const unlockMiddle = playedToday.size >= Math.max(3, Math.floor(dailyLimit / 3));
  const effectiveMaxAge = unlockMiddle ? 3 : maxAge;
  const availableScenes = SCENARIOS.filter(s =>
    !playedToday.has(s.id) && AGE_RANK[s.age] <= effectiveMaxAge
  );

  const pickRandom = () => {
    // ⭐ firstdad 永远第一个：今天还没玩过任何场景 → 强制出 firstdad
    if (playedToday.size === 0) {
      const first = SCENARIOS.find(s => s.id === "firstdad");
      if (first) {
        setScene(first);
        setResult(null);
        setPhase("scene");
        return;
      }
    }
    let pool = availableScenes;
    if (pool.length === 0) {
      // 当前年龄段全玩过：尝试解锁下一阶段
      const futureAvailable = SCENARIOS.filter(s => !playedToday.has(s.id) && AGE_RANK[s.age] > effectiveMaxAge);
      if (futureAvailable.length === 0) {
        finishDay();
        return;
      }
      const minNext = Math.min(...futureAvailable.map(s => AGE_RANK[s.age]));
      pool = SCENARIOS.filter(s => !playedToday.has(s.id) && AGE_RANK[s.age] <= minNext);
      setMaxAge(minNext);
    } else if (unlockMiddle && maxAge < 3) {
      setMaxAge(3);
    }
    const idx = Math.floor(Math.random() * pool.length);
    setScene(pool[idx]);
    setResult(null); setPhase("scene");
  };

  const choose = (choice) => {
    const prev = { ...stats };
    applyEffect(choice.effect, choice.text, prev, choice.result);
    setResult(choice.result);
    setChosenText(choice.text);
    setChosenIcon(choice.icon);
    setChosenEffect(choice.effect);
    setHistory(h => [...h, { scene: scene.title, choice: choice.text, icon: choice.icon }].slice(-8));
    setPlayedToday(prev => new Set([...prev, scene.id]));
    setPhase("result");
  };

  const finishDay = () => {
    const e = pickEnding(stats, achv);
    setEnding(e);
    setPhase("ending");
  };

  const newDay = () => {
    setPlayedToday(new Set());
    setMaxAge(2);
    setEnding(null);
    setScene(null);
    setResult(null);
    setDailyLimit(8 + Math.floor(Math.random() * 5));
    setPhase("home");
  };

  const restart = () => {
    setStats({ qv: 20, sm: 20, hm: 20, liang: 25, secret: 0 });
    setHistory([]);
    setAchv(new Set());
    setPlayedToday(new Set());
    setMaxAge(2);
    setEnding(null);
    setScene(null);
    setResult(null);
    setDailyLimit(8 + Math.floor(Math.random() * 5));
    setPhase("home");
  };

  const secretDanger = stats.secret >= 5;
  const allPlayed = playedToday.size >= dailyLimit;

  return (
    <div style={{
      minHeight: "100vh",
      background: "linear-gradient(160deg, #080814 0%, #0f0f25 50%, #08081a 100%)",
      fontFamily: "'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif",
      color: "#e8e8f0",
    }}>
      <div style={{
        borderBottom: "1px solid rgba(148,163,184,0.1)",
        padding: "18px 20px 14px",
        textAlign: "center",
        background: "linear-gradient(180deg, rgba(99,102,241,0.12) 0%, transparent 100%)",
      }}>
        <div style={{ fontSize: 11, color: "#6366f1", letterSpacing: 4, marginBottom: 5, textTransform: "uppercase" }}>
          SMTR25 · 帝后向同人 · 虚构创作
        </div>
        <div style={{ fontSize: 22, fontWeight: 800, color: "#e0e7ff", letterSpacing: 1 }}>松河民孩子模拟器</div>
        <div style={{ fontSize: 12, color: "#818cf8", marginTop: 3 }}>爹地 × 爸比 · 你是核桃 · v2.2</div>
      </div>

      <div style={{ maxWidth: 460, margin: "0 auto", padding: "0 16px 48px" }}>

        {/* Stats */}
        <div style={{
          background: "rgba(255,255,255,0.035)",
          border: "1px solid rgba(255,255,255,0.07)",
          borderRadius: 16, padding: "14px 16px", marginTop: 16,
        }}>
          {Object.keys(stats).map(k => <StatBar key={k} id={k} value={stats[k]} />)}
          {secretDanger && (
            <div style={{ marginTop: 10, padding: "7px 12px",
              background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.25)",
              borderRadius: 8, fontSize: 12, color: "#fca5a5", textAlign: "center" }}>
              ⚠️ 秘密积累太多了，随时会爆…
            </div>
          )}
        </div>

        {/* Achievements */}
        {achv.size > 0 && (
          <div style={{ marginTop: 10, display: "flex", flexWrap: "wrap", gap: 6 }}>
            {[...achv].map(a => (
              <span key={a} style={{
                padding: "3px 10px",
                background: "rgba(167,139,250,0.12)", border: "1px solid rgba(167,139,250,0.25)",
                borderRadius: 20, fontSize: 11, color: "#c4b5fd",
              }}>🏅 {a}</span>
            ))}
          </div>
        )}

        {/* Today progress */}
        {phase !== "ending" && (
          <div style={{ marginTop: 10, fontSize: 11, color: "#6b7280", textAlign: "center" }}>
            今日进度 {playedToday.size}/{dailyLimit} · 当前阶段 {AGE_MAP[Object.keys(AGE_RANK).find(k => AGE_RANK[k] === maxAge)]}
          </div>
        )}

        {/* ── HOME ── */}
        {phase === "home" && (
          <div style={{ marginTop: 20 }} className="fadein">
            <div style={{
              padding: "24px 18px", borderRadius: 18,
              background: "rgba(99,102,241,0.07)", border: "1px solid rgba(99,102,241,0.12)",
              textAlign: "center", marginBottom: 16,
            }}>
              <div style={{ fontSize: 40, marginBottom: 10 }}>🏠</div>
              <div style={{ fontSize: 14, color: "#c7d2fe", lineHeight: 1.8 }}>
                你是李松河和李河民的孩子，小名"核桃"。<br/>
                <span style={{ color: "#818cf8", fontSize: 12 }}>
                  爹地有偶像包袱，爸比会做饭——<br/>今天又会发生什么？
                </span>
              </div>
            </div>

            {!allPlayed ? (
              <button onClick={pickRandom} style={{
                width: "100%", padding: "15px",
                background: "linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%)",
                border: "none", borderRadius: 14, color: "#fff",
                fontSize: 15, fontWeight: 700, cursor: "pointer",
                boxShadow: "0 4px 20px rgba(99,102,241,0.35)", marginBottom: 14,
              }}>{playedToday.size === 0 ? "开始这一天 🌅" : "随机今日事件 🎲"}</button>
            ) : (
              <button onClick={finishDay} style={{
                width: "100%", padding: "15px",
                background: "linear-gradient(135deg, #db2777 0%, #f59e0b 100%)",
                border: "none", borderRadius: 14, color: "#fff",
                fontSize: 15, fontWeight: 700, cursor: "pointer",
                boxShadow: "0 4px 20px rgba(219,39,119,0.35)", marginBottom: 14,
              }}>查看今日结局 ✨</button>
            )}

            {playedToday.size > 0 && (
              <button onClick={finishDay} style={{
                marginTop: 14, width: "100%", padding: "10px",
                background: "transparent", border: "1px solid rgba(245,158,11,0.4)",
                borderRadius: 10, color: "#fbbf24", fontSize: 12, cursor: "pointer",
              }}>提前结束今天，查看结局 →</button>
            )}
          </div>
        )}

        {/* ── SCENE ── */}
        {phase === "scene" && scene && (
          <div style={{ marginTop: 20 }} className="fadein">
            {scene.age !== "all" && (
              <div style={{ textAlign: "center", marginBottom: 10, fontSize: 12, color: "#6366f1" }}>
                {AGE_MAP[scene.age]}
              </div>
            )}
            <div style={{
              padding: "22px 18px", borderRadius: 18,
              background: "rgba(99,102,241,0.07)", border: "1px solid rgba(99,102,241,0.12)",
              textAlign: "center", marginBottom: 14,
            }}>
              <div style={{ fontSize: 36, marginBottom: 8 }}>{scene.icon}</div>
              <div style={{ fontSize: 16, fontWeight: 700, color: "#e0e7ff", marginBottom: 10 }}>{scene.title}</div>
              <div style={{ fontSize: 13, color: "#a5b4fc", lineHeight: 1.8, whiteSpace: "pre-wrap" }}>{scene.desc}</div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
              {scene.choices.map((c, i) => (
                <button key={i} onClick={() => choose(c)} style={{
                  padding: "13px 16px",
                  background: "rgba(255,255,255,0.035)", border: "1px solid rgba(99,102,241,0.18)",
                  borderRadius: 12, color: "#e0e7ff", fontSize: 13, cursor: "pointer",
                  textAlign: "left", display: "flex", alignItems: "center", gap: 10,
                }}>
                  <span style={{ fontSize: 18, flexShrink: 0 }}>{c.icon}</span>
                  <span>{c.text}</span>
                </button>
              ))}
            </div>
            <button onClick={() => setPhase("home")} style={{
              marginTop: 12, width: "100%", padding: "9px",
              background: "transparent", border: "1px solid rgba(255,255,255,0.06)",
              borderRadius: 10, color: "#6b7280", fontSize: 12, cursor: "pointer",
            }}>← 返回主页</button>
          </div>
        )}

        {/* ── RESULT ── */}
        {phase === "result" && (
          <div style={{ marginTop: 20 }} className="fadein">
            <div style={{
              padding: "22px 18px", borderRadius: 18,
              background: "rgba(99,102,241,0.09)", border: "1px solid rgba(99,102,241,0.18)",
              marginBottom: 14,
            }}>
              <div style={{ fontSize: 30, textAlign: "center", marginBottom: 10 }}>{chosenIcon}</div>
              <div style={{ fontSize: 12, color: "#818cf8", textAlign: "center", marginBottom: 10 }}>
                你选择了：{chosenText}
              </div>
              <div style={{
                fontSize: 14, color: "#c7d2fe", lineHeight: 1.85, textAlign: "left", whiteSpace: "pre-wrap",
                padding: "12px", background: "rgba(255,255,255,0.04)", borderRadius: 10,
              }}>{result}</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 12, justifyContent: "center" }}>
                {Object.entries(chosenEffect).map(([k, v]) => (
                  <span key={k} style={{
                    padding: "3px 9px",
                    background: v > 0 ? "rgba(110,231,183,0.1)" : "rgba(252,165,165,0.1)",
                    border: `1px solid ${v > 0 ? "rgba(110,231,183,0.3)" : "rgba(252,165,165,0.3)"}`,
                    borderRadius: 20, fontSize: 11,
                    color: v > 0 ? "#6ee7b7" : "#fca5a5",
                  }}>
                    {STAT_CFG[k]?.icon} {STAT_CFG[k]?.label} {v > 0 ? "+" : ""}{v}
                  </span>
                ))}
              </div>
            </div>
            <div style={{ display: "flex", gap: 9 }}>
              {!allPlayed ? (
                <button onClick={pickRandom} style={{
                  flex: 1, padding: "13px",
                  background: "linear-gradient(135deg, #4f46e5, #7c3aed)",
                  border: "none", borderRadius: 12, color: "#fff",
                  fontSize: 14, fontWeight: 700, cursor: "pointer",
                }}>继续今天 🎲</button>
              ) : (
                <button onClick={finishDay} style={{
                  flex: 1, padding: "13px",
                  background: "linear-gradient(135deg, #db2777, #f59e0b)",
                  border: "none", borderRadius: 12, color: "#fff",
                  fontSize: 14, fontWeight: 700, cursor: "pointer",
                }}>查看今日结局 ✨</button>
              )}
              <button onClick={() => setPhase("home")} style={{
                padding: "13px 14px",
                background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.07)",
                borderRadius: 12, color: "#9ca3af", fontSize: 13, cursor: "pointer",
              }}>主页</button>
            </div>
          </div>
        )}

        {/* ── ENDING ── */}
        {phase === "ending" && ending && (
          <div style={{ marginTop: 20 }} className="fadein">
            <div style={{
              padding: "26px 20px", borderRadius: 20,
              background: "linear-gradient(135deg, rgba(219,39,119,0.12), rgba(245,158,11,0.10))",
              border: "1px solid rgba(245,158,11,0.25)",
              textAlign: "center", marginBottom: 14,
            }}>
              <div style={{ fontSize: 11, color: "#fbbf24", letterSpacing: 4, marginBottom: 8 }}>TODAY'S ENDING</div>
              <div style={{ fontSize: 48, marginBottom: 8 }}>{ending.icon}</div>
              <div style={{ fontSize: 18, fontWeight: 800, color: "#fde68a", marginBottom: 12 }}>【{ending.name}】</div>
              <div style={{
                fontSize: 13.5, color: "#fef3c7", lineHeight: 2,
                padding: "14px", background: "rgba(0,0,0,0.2)", borderRadius: 12,
                textAlign: "left",
              }}>{ending.text}</div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
              <button onClick={newDay} style={{
                width: "100%", padding: "14px",
                background: "linear-gradient(135deg, #4f46e5, #7c3aed)",
                border: "none", borderRadius: 12, color: "#fff",
                fontSize: 14, fontWeight: 700, cursor: "pointer",
              }}>开启新的一天 🌅</button>
              <button onClick={restart} style={{
                width: "100%", padding: "11px",
                background: "transparent", border: "1px solid rgba(255,255,255,0.1)",
                borderRadius: 12, color: "#9ca3af", fontSize: 12, cursor: "pointer",
              }}>从头再来（重置全部数值）</button>
            </div>
          </div>
        )}

        {/* History */}
        {history.length > 0 && phase !== "ending" && (
          <div style={{ marginTop: 22 }}>
            <div style={{ fontSize: 11, color: "#4b5563", marginBottom: 8, letterSpacing: 2 }}>今日足迹</div>
            {[...history].reverse().map((h, i) => (
              <div key={i} style={{
                padding: "7px 11px", background: "rgba(255,255,255,0.025)", borderRadius: 8,
                fontSize: 12, color: "#6b7280", display: "flex", alignItems: "center", gap: 7,
                marginBottom: 5,
              }}>
                <span>{h.icon}</span>
                <span style={{ color: "#6366f1" }}>{h.scene}</span>
                <span>→</span>
                <span style={{ color: "#9ca3af" }}>{h.choice}</span>
              </div>
            ))}
          </div>
        )}

        <div style={{ marginTop: 32, textAlign: "center", fontSize: 10, color: "#1f2937", lineHeight: 2 }}>
          ※ 虚构同人向创作 · 内容不代表真实艺人 ※
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>


</body></html>
